<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-text bg-game">GAME</div>
    <div class="background-text bg-squid">SQUID</div>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Squid Game Logo" class="logo-img" />
        </div>
        <ul class="nav-links">
            <li><a href="#">About</a></li>
            <li><a href="#" class="active">Watch now</a></li>
            <li><a href="#">Actors</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="menu-icon">
            <i class="fa-solid fa-bars"></i>
        </div>
    </nav>

    <main class="hero-section">
        <div class="hero-content">
            <img src="logo.png" alt="Squid Game Logo Large" class="hero-logo" />
            <p class="description">
                Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                Season 1: 9 Episodes
            </p>
            <div class="hero-buttons">
                <button class="btn btn-primary">
                    <i class="fa-solid fa-play"></i> Play Now
                </button>
                <button class="btn btn-secondary">
                    <i class="fa-regular fa-circle-play"></i> Watch Trailer
                </button>
            </div>
        </div>

        <div class="hero-image-container">
            <img src="guard.png" alt="Squid Game Guard" class="main-character">
        </div>
        
        <div class="social-links">
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        </div>

        <div class="scroll-indicator">
            <span>SCROLL</span>
            <div class="line"></div>
        </div>
    </main>

    <section class="cards-section">
        <div class="card">
            <img src="card1.png" alt="Card 1">
            <div class="play-btn-small"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="card">
            <img src="card2.png" alt="Card 2">
            <div class="play-btn-small"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="card">
            <img src="card3.png" alt="Card 3">
            <div class="play-btn-small"><i class="fa-solid fa-play"></i></div>
        </div>
    </section>
</body>
</html>
