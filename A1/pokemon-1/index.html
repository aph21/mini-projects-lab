<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu</title>
    <link rel="stylesheet" href="style.css" />
    <!-- =====Remix Icon Link======= -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="hero">
      <img
        class="pokemon"
        src="./pokemon.png"
        alt="pokemon"
      />
      <div class="left">
        <img
          class="pokemon-logo"
          src="https://i0.wp.com/vidas-infinitas.com/wp-content/uploads/2022/07/pokemon_720.png?w=723"
          alt="pokemon logo"
        />
        <p class="headline">POKEMON GEN I</p>
        <h1>Pikachu</h1>
        <p>
          Pikachu is an Electric-type Pokémon introduced <br> in Generation I.
          Pikachu are small, chubby, <br> and incredibly cute mouse-like Pokémon. <br>
          They are almost completely covered by <br> yellow fur.
        </p>
        <div class="slider-indicator">
          <div class="line"></div>
          <p>01/08</p>
        </div>
        <img
          class="pokeball-bg"
          src="https://api.iconify.design/tabler:pokeball.svg"
          alt="pokeball watermark"
        />
      </div>
      <div class="right">
        <p><i class="ri-menu-fill"></i></p>

        <div class="dots-container">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </body>
</html>
